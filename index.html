<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOJEONG GAME</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="start" class="screen active">
  <h1>🌿</h1>
  <h2>소정아</h2>
  <p>30초만<br>같이 놀아줘.</p>
  <button onclick="showScreen('promise')">시작하기</button>
</div>

<div id="promise" class="screen">
  <h2>약속 하나</h2>
  <p>끝까지 보면<br>웃을 수도 있어 😊</p>
  <button onclick="showScreen('mission')">좋아 →</button>
</div>

<div id="mission" class="screen">
  <h2>미션!</h2>
  <p>버튼을 5번 눌러줘</p>
  <button id="tapBtn">0 / 5</button>
</div>

<div id="clear" class="screen">
  <h2>잘했어 😊</h2>
  <p>이제 마지막 질문이야.</p>
  <button onclick="showScreen('question')">가기 →</button>
</div>

<div id="question" class="screen">
  <h2>🌿 마지막 질문</h2>
  <p>나랑 다시 한번<br>만나보겠습니까?</p>

  <button id="yes">만나겠습니다 😊</button>
  <button id="no">만나지 않겠습니다</button>

  <div id="message"></div>
</div>

<div id="ending" class="screen">
  <h2>알겠어.</h2>
  <p>
    장난은 여기까지. 😊<br><br>
    부담 주려고 만든 건 아니야.<br>
    그냥 한 번 웃었으면 좋겠어서.
  </p>
  <button onclick="showScreen('start')">처음으로</button>
</div>

<script src="script.js"></script>
</body>
</html>
